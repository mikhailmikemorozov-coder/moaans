<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#16171d"/>
  <!-- Rainbow arc ring: r=24, C=150.80, each arc=25.13, gap=125.66 -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#00d4ff" stroke-width="8" stroke-linecap="round" stroke-dasharray="25.13 125.66" stroke-dashoffset="0" transform="rotate(-90 32 32)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ffd700" stroke-width="8" stroke-linecap="round" stroke-dasharray="25.13 125.66" stroke-dashoffset="-25.13" transform="rotate(-90 32 32)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#7fd400" stroke-width="8" stroke-linecap="round" stroke-dasharray="25.13 125.66" stroke-dashoffset="-50.27" transform="rotate(-90 32 32)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ff0080" stroke-width="8" stroke-linecap="round" stroke-dasharray="25.13 125.66" stroke-dashoffset="-75.40" transform="rotate(-90 32 32)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#bf00ff" stroke-width="8" stroke-linecap="round" stroke-dasharray="25.13 125.66" stroke-dashoffset="-100.53" transform="rotate(-90 32 32)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#00eaff" stroke-width="8" stroke-linecap="round" stroke-dasharray="25.13 125.66" stroke-dashoffset="-125.66" transform="rotate(-90 32 32)"/>
