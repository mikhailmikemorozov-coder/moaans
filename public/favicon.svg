  <line x1="32" y1="32" x2="47.2" y2="27" stroke="#8b5cf6" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="41.4" y2="45" stroke="#8b5cf6" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="22.6" y2="45" stroke="#8b5cf6" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="16.8" y2="27" stroke="#8b5cf6" stroke-width="3.5" stroke-linecap="round"/>
