<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#16171d"/>
  <!-- Gradient background -->
  <radialGradient id="g1" cx="30%" cy="50%" r="60%">
    <stop offset="0%" stop-color="rgba(170,59,255,0.15)"/>
    <stop offset="100%" stop-color="rgba(170,59,255,0)"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>

  <!-- Wheel logo -->
  <g transform="translate(160, 315)">
    <!-- Rainbow arcs -->
    <circle cx="0" cy="0" r="96" fill="none" stroke="#00d4ff" stroke-width="32" stroke-linecap="round" stroke-dasharray="100.53 502.65" stroke-dashoffset="0" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#ffd700" stroke-width="32" stroke-linecap="round" stroke-dasharray="100.53 502.65" stroke-dashoffset="-100.53" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#7fd400" stroke-width="32" stroke-linecap="round" stroke-dasharray="100.53 502.65" stroke-dashoffset="-201.06" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#ff0080" stroke-width="32" stroke-linecap="round" stroke-dasharray="100.53 502.65" stroke-dashoffset="-301.59" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#bf00ff" stroke-width="32" stroke-linecap="round" stroke-dasharray="100.53 502.65" stroke-dashoffset="-402.12" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#00eaff" stroke-width="32" stroke-linecap="round" stroke-dasharray="100.53 502.65" stroke-dashoffset="-502.65" transform="rotate(-90)"/>
    <!-- Tire -->
    <circle cx="0" cy="0" r="80" fill="#090910"/>
    <circle cx="0" cy="0" r="62" fill="#0d0d1a"/>
    <!-- Spokes -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="57" y2="-18.5" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35.3" y2="48.5" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-35.3" y2="48.5" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-57" y2="-18.5" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="18" fill="#bf00ff"/>
    <circle cx="0" cy="0" r="9" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Text -->
  <text x="300" y="280" font-family="system-ui, sans-serif" font-size="96" font-weight="700" letter-spacing="8" fill="white">BI <tspan fill="#bf00ff">COLOR</tspan></text>
  <text x="304" y="355" font-family="system-ui, sans-serif" font-size="28" letter-spacing="6" fill="rgba(255,255,255,0.4)">BEAUTIFUL IRON</text>
  <text x="304" y="430" font-family="system-ui, sans-serif" font-size="36" fill="rgba(255,255,255,0.7)">Покраска и восстановление дисков</text>
  <text x="304" y="490" font-family="system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.4)">Москва · bi-color.ru</text>
</svg>
